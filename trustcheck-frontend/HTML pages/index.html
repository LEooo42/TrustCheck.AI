<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustCheck.AI</title>
    <link rel="stylesheet" href="../CSS styles/index.css">
    <link rel="icon" href="../Images/tab_icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="vanta-bg"></div>

    <header>
        <h1 class="wesbite-header-name">TrustCheck.AI</h1>

        <div class="top-buttons-container">
            <a href="#"><button class="home-button active-button">Home</button></a>
            <a href="../HTML pages/history.html"><button class="history-button">Ad History</button></a>
            <a href="../HTML pages/about.html"><button class="about-button">About</button></a>
            <a href="../HTML pages/contact.html"><button class="contact-button">Contact</button></a>
        </div>

        <button class="register-button">Get Started</button>
    </header>

    <main>
        <div class="upload-form">
            <div class="upload-container" id="drop-area">
                <label for="fileInput" class="upload-header clickable-label">
                    <img src="../Images/upload.png" alt="Upload Icon" class="icon-image">
                    <p>Drag & Drop your image(s) or click to browse</p>
                </label>

                <div class="upload-footer">
                    <p id="fileName">No files selected</p>
                    <button id="delete-btn" class="delete-button" title="Clear files">
                        <img src="../Images/delete.png" alt="Delete Icon" class="icon-image small">
                    </button>
                </div>

                <input id="fileInput" type="file" accept="image/*" multiple>
            </div>

            <div id="previewArea" class="preview-area">
                <img id="imagePreview" style="display:none; max-width:100%; margin-top:10px;" />
            </div>

            <div class="form-fields">
                <label for="textInput">Post Text:</label>
                <textarea id="textInput" rows="4" placeholder="Your post caption"></textarea>

                <label for="platformSelect">Choose Platform:</label>
                <select id="platformSelect">
                    <option value="">Not Selected</option>
                    <option value="facebook">Facebook</option>
                    <option value="google">Google</option>
                </select>

                <button id="analyzeButton" class="register-button" disabled>Analyze</button>

                <div id="loadingDots" class="dots-container" style="display: none;">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- <div id="aiResultPopup" class="ai-popup hidden">
        <div class="ai-popup-content">
            <span class="ai-close-btn" onclick="closePopup()">✖</span>
            <h2>AI Review Result</h2>
            <div class="slider-container">
                <input type="range" min="0" max="100" value="50" id="scoreSlider" disabled />
                <div id="scoreValue">Score: 0</div>
            </div>
            <div id="aiResultContent" class="ai-result-text"></div>
        </div>
    </div> -->

    <div id="aiResultPopup" class="ai-popup hidden">
        <div class="ai-modal">

            <div class="ai-modal__header">
                <div class="ai-modal__title-group">
                    <svg class="ai-modal__icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="10" cy="10" r="9" stroke="#3885f1" stroke-width="1.5"/>
                        <path d="M6.5 10.5l2.5 2.5 4.5-5" stroke="#3885f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="ai-modal__title">Analysis Report</span>
                </div>
                <div class="ai-modal__header-right">
                    <span id="verdictBadge" class="verdict-pill">—</span>
                    <button class="ai-modal__close" onclick="closePopup()" aria-label="Close">
                        <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="ai-modal__hero">
                <div class="score-ring-wrap">
                    <svg class="score-ring" id="scoreRingSvg" viewBox="0 0 120 120">
                        <circle class="score-ring__track" cx="60" cy="60" r="50"/>
                        <circle class="score-ring__fill" id="scoreRingFill" cx="60" cy="60" r="50"
                                stroke-dasharray="314.16" stroke-dashoffset="314.16"/>
                    </svg>
                    <div class="score-ring__center">
                        <span class="score-ring__num" id="scoreValue">0</span>
                        <span class="score-ring__sub">/ 100</span>
                    </div>
                </div>

                <div class="ai-meta-grid">
                    <div class="meta-chip">
                        <span class="meta-chip__label">Platform</span>
                        <span class="meta-chip__value" id="platformValue">—</span>
                    </div>
                    <div class="meta-chip">
                        <span class="meta-chip__label">Overall</span>
                        <span class="meta-chip__value" id="overallLabel">—</span>
                    </div>
                    <div class="meta-chip meta-chip--wide" id="summaryChip">
                        <span class="meta-chip__label">Summary</span>
                        <span class="meta-chip__value meta-chip__value--summary" id="summaryText">—</span>
                    </div>
                </div>
            </div>

            <div class="ai-modal__divider"></div>

            <div class="ai-tabs" role="tablist">
                <button class="ai-tab ai-tab--active" data-tab="violations" role="tab">
                    <svg viewBox="0 0 16 16" fill="none"><path d="M8 2L14 13H2L8 2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M8 7v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="11.5" r="0.6" fill="currentColor"/></svg>
                    Violations
                    <span class="ai-tab__count" id="violationsCount">0</span>
                </button>
                <button class="ai-tab" data-tab="suggestions" role="tab">
                    <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="11" r="0.6" fill="currentColor"/></svg>
                    Suggestions
                    <span class="ai-tab__count ai-tab__count--blue" id="suggestionsCount">0</span>
                </button>
            </div>

            <div class="ai-panels">

                <div class="ai-panel ai-panel--active" id="panel-violations">
                    <div class="panel-cols">
                        <div class="panel-col">
                            <p class="panel-col__heading">
                                <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M5 7h4M5 9.5h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M5 4.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                                Text
                            </p>
                            <ul id="textViolations" class="issue-list"></ul>
                        </div>
                        <div class="panel-col">
                            <p class="panel-col__heading">
                                <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 9l3-3 2 2 3-3 4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4.5" cy="4.5" r="1" stroke="currentColor" stroke-width="1"/></svg>
                                Image
                            </p>
                            <ul id="imageViolations" class="issue-list"></ul>
                        </div>
                    </div>
                </div>

                <div class="ai-panel" id="panel-suggestions">
                    <div class="panel-cols">
                        <div class="panel-col">
                            <p class="panel-col__heading">
                                <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M5 7h4M5 9.5h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M5 4.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                                Text
                            </p>
                            <ul id="textSuggestions" class="issue-list issue-list--suggestion"></ul>
                        </div>
                        <div class="panel-col">
                            <p class="panel-col__heading">
                                <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 9l3-3 2 2 3-3 4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4.5" cy="4.5" r="1" stroke="currentColor" stroke-width="1"/></svg>
                                Image
                            </p>
                            <ul id="imageSuggestions" class="issue-list issue-list--suggestion"></ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="ai-modal__footer">
                <button class="ai-modal__copy-btn" id="copyReportBtn">
                    <svg viewBox="0 0 16 16" fill="none"><rect x="5" y="1" width="9" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 5H1.5A1.5 1.5 0 000 6.5v8A1.5 1.5 0 001.5 16h8A1.5 1.5 0 0011 14.5V14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    Copy Report
                </button>
            </div>

        </div>
    </div>


    <footer class="footer">
        <p>© <span id="year"></span> TrustCheck.AI - Built by one curious mind.</p>
    </footer>
    
    <script src="../JS scripts/index.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
        VANTA.NET({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x105c83,
            backgroundColor: 0x30321
        });
    </script>
</body>
</html>
