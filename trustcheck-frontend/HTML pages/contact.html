<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="../CSS styles/contact.css">
    <link rel="icon" href="../Images/tab_icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="vanta-bg"></div>
    
    <header>
        <h1 class="wesbite-header-name">TrustCheck.AI</h1>

        <div class="top-buttons-container">
            <a href="index.html"><button class="home-button">Home</button></a>
            <a href="history.html"><button class="history-button">Ad History</button></a>
            <a href="about.html"><button class="about-button">About</button></a>
            <a href="contact.html"><button class="contact-button active-button">Contact</button></a>
        </div>


        <button class="register-button">Get Started</button>
    </header>

    <main>
        <div class="contact-wrapper">
            <h2>Contact Me</h2>
            <p>Got questions, suggestions, or just want to say hi? Fill the form below or reach out on GitHub.</p>

            <form id="contactForm" class="contact-form" novalidate>
                <div class="field-group">
                    <label for="name">Full Name</label>
                    <label class="error-message" id="nameError"></label>
                    <input type="text" id="name" name="name" autocomplete="off"/>
                </div>

                <div class="field-group">
                    <label for="email">E-mail</label>
                    <label class="error-message" id="emailError"></label>
                    <input type="email" id="email" name="email" autocomplete="off" />
                </div>

                <div class="field-group">
                    <label for="message">Message</label>
                    <label class="error-message" id="messageError"></label>
                    <textarea id="message" name="message" rows="1"></textarea>
                </div>

                <button type="submit" class="register-button">Send Message</button>

                <div id="emailLoadingDots" class="dots-container" style="display: none;">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </form>

            <a href="https://github.com/LEooo42" target="_blank" class="github-link">
                <img src="../Images/github.png" alt="GitHub logo" class="github-icon" />
                GitHub Profile
            </a>

            <p id="formStatus" class="form-status"></p>
        </div>
    </main>
    
    <footer class="footer">
        <p>© <span id="year"></span> TrustCheck.AI — Built by one curious mind.</p>
    </footer>

    <script src="https://unpkg.com/@emailjs/browser@3.11.0/dist/email.min.js"></script>
    <script>
        emailjs.init("0slvH8QVP6B_8NgcO");
    </script>
    <script src="../JS scripts/auth.js"></script>
    <script src="../JS scripts/contact.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
        VANTA.NET({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x105c83,
            backgroundColor: 0x30321
        });
    </script>
</body>
</html>
