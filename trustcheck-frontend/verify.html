<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <link rel="icon" href="Images/tab_icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0f1e;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .card {
            background: #13141a;
            border: 1px solid rgba(56,133,241,0.2);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .icon {
            width: 64px; height: 64px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; font-size: 28px;
        }
        .icon--loading { background: rgba(56,133,241,0.15); border: 2px solid #3885f1; color: #3885f1; }
        .icon--success { background: rgba(57,217,138,0.15); border: 2px solid #39d98a; color: #39d98a; }
        .icon--error   { background: rgba(255,107,107,0.15); border: 2px solid #ff6b6b; color: #ff6b6b; }
        h1 { color: #fff; font-size: 22px; margin-bottom: 12px; }
        h1 span { color: #3885f1; }
        p  { color: #8899aa; font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
        a  {
            display: inline-block; background: #3885f1; color: #fff;
            text-decoration: none; padding: 12px 28px; border-radius: 10px;
            font-weight: 600; font-size: 14px;
        }
        a:hover { background: #2a6fd4; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon icon--loading" id="icon">⋯</div>
        <h1>TrustCheck<span>.AI</span></h1>
        <p id="msg">Verifying your email address…</p>
        <a href="index.html" id="homeLink" style="display:none">Back to TrustCheck.AI</a>
    </div>

    <script>
        const API_BASE = "trustcheck-frontend/JS scripts/index.js";
        const params   = new URLSearchParams(window.location.search);
        const token    = params.get("token");

        async function verify() {
            const icon     = document.getElementById("icon");
            const msg      = document.getElementById("msg");
            const homeLink = document.getElementById("homeLink");

            if (!token) {
                icon.className = "icon icon--error";
                icon.textContent = "✗";
                msg.textContent  = "No verification token found in the URL.";
                homeLink.style.display = "inline-block";
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/auth/verify-email?token=${encodeURIComponent(token)}`);
                if (res.ok) {
                    icon.className   = "icon icon--success";
                    icon.textContent = "✓";
                    msg.textContent  = "Your email has been verified! You can now close this tab or return to TrustCheck.AI.";

                    const session = JSON.parse(localStorage.getItem("tc_session") || "null");
                    if (session) {
                        session.verified = true;
                        localStorage.setItem("tc_session", JSON.stringify(session));
                    }
                } else {
                    throw new Error("invalid");
                }
            } catch {
                icon.className   = "icon icon--error";
                icon.textContent = "✗";
                msg.textContent  = "This link is invalid or has expired. You can request a new one from Account Settings.";
            }
            homeLink.style.display = "inline-block";
        }

        verify();
    </script>
</body>
</html>
